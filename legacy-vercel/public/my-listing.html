<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Listing · Legacy Properties</title>
<link rel="stylesheet" href="/legacy.css">
<style>
body { background: var(--vellum); color: var(--ink); }
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 0 60px; }
.ld-load, .ld-gone { padding: 90px 28px; text-align: center; }
.ld-gone h1 { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 30px; }
.spin { width: 26px; height: 26px; border: 2px solid var(--rule-strong); border-top-color: var(--brass); border-radius: 50%; margin: 0 auto 16px; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* header */
.ld-top { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--rule); background: var(--shell); flex-wrap: wrap; gap: 12px; }
.ld-mark { font-family: var(--mono); font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--brass); }
.ld-mark small { display: block; font-family: var(--serif); font-style: italic; letter-spacing: 0; text-transform: none; font-size: 15px; color: var(--ink-soft); margin-top: 3px; }
.ld-who { display: flex; align-items: center; gap: 10px; }
.ld-av { width: 40px; height: 40px; border-radius: 50%; background: var(--brass); color: var(--shell); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 16px; }
.ld-who .nm { font-size: 13px; font-weight: 500; } .ld-who .mt { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--ink-mute); text-transform: uppercase; }

/* hero */
.ld-hero { display: grid; grid-template-columns: 320px 1fr auto; gap: 28px; padding: 28px 32px; background: var(--shell); border-bottom: 1px solid var(--rule); align-items: start; }
.ld-photo { width: 320px; aspect-ratio: 4/3; background: var(--vellum); border: 1px solid var(--rule); overflow: hidden; position: relative; }
.ld-photo img { width: 100%; height: 100%; object-fit: cover; }
.ld-photo .badge { position: absolute; top: 12px; left: 12px; background: var(--brass); color: var(--shell); font-family: var(--mono); font-size: 9px; letter-spacing: .16em; padding: 5px 10px; text-transform: uppercase; }
.ld-h .eyebrow { display: block; margin-bottom: 10px; }
.ld-h h1 { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: clamp(30px, 3.6vw, 46px); line-height: 1.02; }
.ld-h h1 em { color: var(--brass); }
.ld-h .addr { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink-soft); margin-top: 8px; }
.ld-specs { display: flex; gap: 20px; margin-top: 16px; font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); flex-wrap: wrap; }
.ld-specs strong { color: var(--ink); font-family: var(--serif); font-style: italic; font-size: 16px; letter-spacing: 0; text-transform: none; font-weight: 400; margin-right: 4px; }
.ld-price { background: var(--ink); color: var(--shell); padding: 20px 24px; min-width: 220px; }
.ld-price .l { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--brass-bright); }
.ld-price .v { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 34px; line-height: 1.1; margin-top: 4px; }
.ld-price .s { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; color: rgba(250,246,236,.55); text-transform: uppercase; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(250,246,236,.15); }

/* KPI */
.ld-kpi { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--rule); border-bottom: 1px solid var(--rule); }
.ld-kpi .c { background: var(--shell); padding: 18px 20px; }
.ld-kpi .l { font-family: var(--mono); font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-mute); }
.ld-kpi .v { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 34px; color: var(--ink); line-height: 1; margin: 4px 0; }
.ld-kpi .ch { font-family: var(--mono); font-size: 9.5px; letter-spacing: .04em; color: var(--brass); }

/* layout */
.ld-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 28px; padding: 28px 32px; }
.ld-grid > div { display: flex; flex-direction: column; gap: 24px; min-width: 0; }
.card { background: var(--shell); border: 1px solid var(--rule); padding: 24px 26px; }
.card-h { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--rule); padding-bottom: 14px; margin-bottom: 18px; gap: 10px; flex-wrap: wrap; }
.card-h h2 { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 24px; }
.card-h .meta { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); }
.empty { color: var(--ink-mute); font-style: italic; font-family: var(--serif); font-size: 15px; padding: 6px 0; }

/* trend chart */
.trend { display: flex; align-items: flex-end; gap: 3px; height: 140px; padding-top: 8px; }
.trend .bar { flex: 1; background: var(--rule-strong); min-height: 2px; transition: height .3s; }
.trend .bar.brass { background: var(--brass); }
.trend-axis { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink-faint); text-transform: uppercase; }
.trend-legend { font-family: var(--mono); font-size: 10px; letter-spacing: .06em; color: var(--brass); text-transform: uppercase; margin-top: 12px; }

/* sara note */
.note { background: var(--ink); color: var(--shell); padding: 24px; }
.note .h { font-family: var(--mono); font-size: 10px; letter-spacing: .16em; color: var(--brass-bright); text-transform: uppercase; margin-bottom: 8px; }
.note .b { font-family: var(--serif); font-style: italic; font-size: 17px; line-height: 1.5; color: rgba(250,246,236,.92); }
.note .s { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: rgba(250,246,236,.5); text-transform: uppercase; margin-top: 14px; }

/* offers */
.offer { border: 1px solid var(--rule); padding: 16px 18px; margin-bottom: 10px; }
.offer.lead { border-color: var(--brass); box-shadow: inset 0 0 0 1px var(--brass); }
.offer .eyb { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); }
.offer .amt { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 30px; color: var(--ink); line-height: 1.1; margin: 3px 0; }
.offer .amt .pill { font-family: var(--mono); font-style: normal; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; background: var(--brass); color: var(--shell); padding: 3px 8px; margin-left: 8px; vertical-align: middle; }
.offer .by { font-size: 13.5px; color: var(--ink); } .offer .dt { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }

/* rows */
.row { display: grid; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--rule-soft); }
.row:last-child { border-bottom: none; }
.show-row { grid-template-columns: 46px 1fr auto; align-items: center; }
.show-date { text-align: center; } .show-date .d { font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1; } .show-date .m { font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); }
.show-row .b { font-size: 13.5px; color: var(--ink); } .show-row .a { font-size: 12px; color: var(--ink-soft); } .show-row .st { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--brass); }
.comp-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.comp-table th { font-family: var(--mono); font-size: 8.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); text-align: left; padding: 8px 8px; border-bottom: 1px solid var(--rule); }
.comp-table td { padding: 10px 8px; border-bottom: 1px solid var(--rule-soft); }
.comp-table .ad { color: var(--ink); } .comp-table .sub { display: block; font-size: 10px; color: var(--ink-faint); }
.pstat { font-family: var(--mono); font-size: 8.5px; letter-spacing: .08em; text-transform: uppercase; padding: 2px 6px; }
.pstat.active { background: var(--linen); color: var(--moss); } .pstat.pending { background: var(--linen); color: var(--brass); } .pstat.sold { background: var(--ink); color: var(--shell); }
.price-vs { display: flex; gap: 20px; margin-bottom: 14px; }
.price-vs .box { flex: 1; text-align: center; padding: 14px; background: var(--vellum); }
.price-vs .box .l { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); }
.price-vs .box .v { font-family: var(--serif); font-style: italic; font-size: 30px; color: var(--ink); }
.price-vs .box.you .v { color: var(--brass); }
.price-sum { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

.chk { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--rule-soft); font-size: 13.5px; }
.chk:last-child { border-bottom: none; }
.chk .bx { width: 16px; height: 16px; border: 1px solid var(--rule-strong); flex: none; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--shell); }
.chk.done .bx { background: var(--brass); border-color: var(--brass); }
.chk.done .lb { color: var(--ink-mute); text-decoration: line-through; }
.chk .wh { margin-left: auto; font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-mute); }
.doc { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule-soft); font-size: 13px; }
.doc:last-child { border-bottom: none; }
.doc .ic { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; color: var(--brass); }
.doc .sub { display: block; font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink-faint); text-transform: uppercase; }
.doc a { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--brass); text-decoration: none; border-bottom: 1px solid var(--brass); }
.act { display: grid; grid-template-columns: 12px 1fr auto; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--rule-soft); align-items: start; }
.act:last-child { border-bottom: none; }
.act .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--brass); margin-top: 4px; }
.act .dot.ink { background: var(--ink); } .act .dot.faint { background: var(--rule-strong); }
.act .tx { font-size: 13px; color: var(--ink); line-height: 1.4; } .act .wh { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink-mute); text-transform: uppercase; white-space: nowrap; }
.share { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--rule-soft); }
.share:last-child { border-bottom: none; }
.share .nm { font-size: 13px; color: var(--ink); font-weight: 500; } .share .rl { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink-mute); text-transform: uppercase; }
.share .ac { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--brass); text-transform: uppercase; }
.ld-foot { padding: 26px 32px; border-top: 1px solid var(--rule); font-size: 12px; color: var(--ink-mute); }
.ld-foot a { color: var(--brass); }

@media (max-width: 900px) {
  .ld-hero { grid-template-columns: 1fr; } .ld-photo { width: 100%; }
  .ld-kpi { grid-template-columns: repeat(2, 1fr); } .ld-grid { grid-template-columns: 1fr; padding: 20px; }
  .ld-top, .ld-hero { padding: 18px 20px; }
}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="ld-load" id="load"><div class="spin"></div><div class="mono" style="font-size:10px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase;">Loading your listing…</div></div>
</div>

<script>
(function () {
  var wrap = document.getElementById('wrap');
  var esc = function (s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); };

  fetch('/api/seller/listing', { credentials: 'include' }).then(function (r) {
    if (r.status === 401) { gone('Please sign in to view your listing dashboard.', true); throw 'auth'; }
    if (!r.ok) { gone('We couldn\'t load your listing right now.'); throw 'err'; }
    return r.json();
  }).then(function (d) { if (d && d.success) render(d.portal || {}); }).catch(function () {});

  function gone(msg, signin) {
    wrap.innerHTML = '<div class="ld-gone"><span class="eyebrow" style="color:var(--brass);">Legacy Properties</span>' +
      '<h1 style="margin-top:12px;">' + esc(msg) + '</h1>' +
      (signin ? '<p style="margin-top:14px;"><a class="btn btn-ink btn-sm" href="/seller.html">Go to sign in</a></p>' : '') + '</div>';
  }

  function kpiCell(l, v, ch) { return '<div class="c"><div class="l">' + esc(l) + '</div><div class="v">' + esc(v) + '</div><div class="ch">' + esc(ch) + '</div></div>'; }

  function render(p) {
    var L = p.listing || {}, K = p.kpi || {}, S = p.seller || {}, T = p.trend || {}, N = p.sara_note || {}, PR = p.pricing || {};
    var photo = L.photo ? '<img src="' + esc(L.photo) + '" alt="">' : '';

    var specs = [];
    if (L.beds && L.beds !== '—') specs.push('<span><strong>' + esc(L.beds) + '</strong>bd</span>');
    if (L.baths && L.baths !== '—') specs.push('<span><strong>' + esc(L.baths) + '</strong>ba</span>');
    if (L.sq_ft && L.sq_ft !== '—') specs.push('<span><strong>' + esc(L.sq_ft) + '</strong>sqft</span>');
    if (L.lot_acres && L.lot_acres !== '—') specs.push('<span><strong>' + esc(L.lot_acres) + '</strong>ac</span>');
    if (L.year_built && L.year_built !== '—') specs.push('<span>Built <strong style="margin-left:4px;">' + esc(L.year_built) + '</strong></span>');

    // trend
    var bars = (T.bars || []).map(function (b) { return '<div class="bar ' + (b.brass || '') + '" style="height:' + esc(b.height || '2%') + ';"></div>'; }).join('');
    var axis = (T.axis_dates || []).map(function (x) { return '<span>' + esc(x) + '</span>'; }).join('');

    // offers
    var offers = (p.offers || []).length ? (p.offers || []).map(function (o) {
      return '<div class="offer ' + (o.is_leading ? 'lead' : '') + '"><div class="eyb">' + esc(o.eyebrow) + '</div>' +
        '<div class="amt">' + esc(o.amount) + (o.status_label ? '<span class="pill">' + esc(o.status_label) + '</span>' : '') + '</div>' +
        '<div class="by">' + esc(o.buyer) + '</div><div class="dt">' + esc(o.detail) + '</div></div>';
    }).join('') : '<div class="empty">No offers in yet. I\'ll flag the first one the moment it lands.</div>';

    // showings
    var showings = (p.showings || []).length ? (p.showings || []).map(function (s) {
      return '<div class="row show-row"><div class="show-date"><div class="d">' + esc(s.day) + '</div><div class="m">' + esc(s.dow) + '</div></div>' +
        '<div><div class="b">' + esc(s.buyer) + '</div><div class="a">' + esc(s.time) + ' · ' + esc(s.agent) + '</div></div>' +
        '<div class="st">' + esc(s.status) + '</div></div>';
    }).join('') : '<div class="empty">No showings booked yet.</div>';

    // comps
    var comps = (p.comps || []).length ? ('<table class="comp-table"><thead><tr><th>Comp</th><th>Price</th><th>Sq ft</th><th>$/sqft</th><th>DOM</th><th>Status</th></tr></thead><tbody>' +
      (p.comps || []).map(function (c) {
        return '<tr><td class="ad">' + esc(c.address) + '<span class="sub">' + esc(c.sub) + '</span></td><td>' + esc(c.price) + '</td><td>' + esc(c.sq_ft) + '</td><td>' + esc(c.psf) + '</td><td>' + esc(c.days_on_market) + '</td><td><span class="pstat ' + esc(c.status_class || '') + '">' + esc(c.status_label) + '</span></td></tr>';
      }).join('') + '</tbody></table>') : '<div class="empty">Comparable set is still building.</div>';

    // checklist / docs / activity / sharing
    var checklist = (p.checklist || []).length ? (p.checklist || []).map(function (c) {
      return '<div class="chk ' + (c.done_class || '') + '"><span class="bx">' + (c.done ? '✓' : '') + '</span><span class="lb">' + esc(c.label) + '</span><span class="wh">' + esc(c.when) + '</span></div>';
    }).join('') : '<div class="empty">No checklist items yet.</div>';
    var docs = (p.documents || []).length ? (p.documents || []).map(function (dd) {
      return '<div class="doc"><span class="ic">' + esc(dd.icon) + '</span><div>' + esc(dd.name) + '<span class="sub">' + esc(dd.sub) + '</span></div><a href="' + esc(dd.url) + '" target="_blank" rel="noopener">Open</a></div>';
    }).join('') : '<div class="empty">No documents shared yet.</div>';
    var activity = (p.activity || []).length ? (p.activity || []).map(function (a) {
      return '<div class="act"><span class="dot ' + esc(a.dot_class || '') + '"></span><span class="tx">' + a.text_html + '</span><span class="wh">' + esc(a.when) + '</span></div>';
    }).join('') : '<div class="empty">Activity will appear here as it happens.</div>';
    var sharing = (p.sharing || []).map(function (s) {
      return '<div class="share"><div><div class="nm">' + esc(s.name) + '</div><div class="rl">' + esc(s.role) + '</div></div><div class="ac">' + esc(s.access) + '</div></div>';
    }).join('');

    wrap.innerHTML =
      '<header class="ld-top"><div class="ld-mark">Legacy Properties<small>Your listing, live.</small></div>' +
        '<div class="ld-who"><div class="ld-av">' + esc(S.initials || 'S') + '</div><div><div class="nm">' + esc(S.name || '') + '</div><div class="mt">' + esc(S.meta || '') + '</div></div></div></header>' +

      '<section class="ld-hero"><div class="ld-photo">' + photo + (L.badge ? '<span class="badge">' + esc(L.badge) + '</span>' : '') + '</div>' +
        '<div class="ld-h"><span class="eyebrow" style="color:var(--brass);">' + esc(L.eyebrow || '') + '</span>' +
          '<h1>' + esc(L.headline || 'Your home') + '<br><em>' + esc(L.headline_em || '') + '</em></h1>' +
          '<p class="addr">' + esc(L.address_line2 || '') + '</p>' +
          '<div class="ld-specs">' + specs.join('') + '</div></div>' +
        '<div class="ld-price"><div class="l">' + esc(L.status_label || 'Listed at') + '</div><div class="v">' + esc(L.list_price || '—') + '</div><div class="s">' + esc(L.listed_since || '') + '</div></div>' +
      '</section>' +

      '<section class="ld-kpi">' +
        kpiCell('Page views', K.page_views, K.page_views_change) +
        kpiCell('Unique viewers', K.unique_viewers, K.unique_viewers_change) +
        kpiCell('Saves', K.saves, K.saves_change) +
        kpiCell('Showings', K.showings, K.showings_change) +
        kpiCell('Offers', K.offers, K.offers_change) +
      '</section>' +

      '<div class="ld-grid"><div>' +
        '<section class="card"><div class="card-h"><h2>Buyer traffic.</h2><span class="meta">Last 21 days</span></div>' +
          '<div class="trend">' + bars + '</div><div class="trend-axis">' + axis + '</div><div class="trend-legend">' + esc(T.legend_delta || '') + '</div></section>' +
        '<section class="card"><div class="card-h"><h2>Offers.</h2><span class="meta">' + (p.offers || []).length + ' total</span></div>' + offers + '</section>' +
        '<section class="card"><div class="card-h"><h2>Showings.</h2><span class="meta">' + esc(K.showings_change || '') + '</span></div>' + showings + '</section>' +
        '<section class="card"><div class="card-h"><h2>How you\'re priced.</h2><span class="meta">' + esc(PR.comp_count || '0') + ' comps</span></div>' +
          '<div class="price-vs"><div class="box you"><div class="l">Your $/sqft</div><div class="v">' + esc(PR.your_psf || '—') + '</div></div><div class="box"><div class="l">Comp avg</div><div class="v">' + esc(PR.avg_psf || '—') + '</div></div></div>' +
          '<p class="price-sum">' + esc(PR.summary || '') + '</p><div style="margin-top:16px;overflow-x:auto;">' + comps + '</div></section>' +
      '</div><div>' +
        '<section class="note"><div class="h">' + esc(N.head || 'A note from Sara') + '</div><p class="b">' + esc(N.body || '') + '</p><div class="s">' + esc(N.sign || '') + '</div></section>' +
        '<section class="card"><div class="card-h"><h2>Pre-listing.</h2><span class="meta">' + esc(p.checklist_summary || '') + '</span></div>' + checklist + '</section>' +
        '<section class="card"><div class="card-h"><h2>Documents.</h2></div>' + docs + '</section>' +
        '<section class="card"><div class="card-h"><h2>Activity.</h2></div>' + activity + '</section>' +
        '<section class="card"><div class="card-h"><h2>Who has access.</h2></div>' + sharing + '</section>' +
      '</div></div>' +

      '<footer class="ld-foot">Legacy Properties · Sara Cooper, Broker-Owner · DRE #02141987 · <a href="tel:2095594966">(209) 559-4966</a> · In escrow? <a href="/seller.html">Open your closing portal</a>.</footer>';
  }
})();
</script>
</body>
</html>
