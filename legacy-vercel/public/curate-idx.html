<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add listings · Legacy Properties</title>
<!-- This bespoke capture page is retired: iHomefinder's Kestrel widget renders
     inside an open shadow root and behaves best on the long-registered public
     search page. The capture overlay now lives on property-search.html
     (see curate-capture.js). Old links land here, so forward them along. -->
<script>
  var q = new URLSearchParams(location.search);
  var id = q.get('collection') || q.get('capture') || '';
  var title = q.get('title') || '';
  location.replace('/property-search.html' + (id ? '?capture=' + encodeURIComponent(id) + '&title=' + encodeURIComponent(title) : ''));
</script>
</head>
<body></body>
</html>
