<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add listings · Legacy Properties</title>
<!-- Full-page iHomefinder (Kestrel) MLS search — the SAME live IDX search the
     public site uses (property-search.html). Kestrel only initializes as a
     top-level page (it will not render framed or injected into the CRM SPA),
     so the CRM opens THIS page in a new tab. It's same-origin, so it shares the
     agent's session cookie and can add a listing straight to a collection:
     click "＋ Add to collection" on any card and it POSTs to the same
     /api/curate/collections endpoint the CRM uses. -->
<link rel="stylesheet" href="idx-theme.css">
<style>
  html, body { margin: 0; background: #fff; }
  body { font-family: 'DM Sans', system-ui, sans-serif; color: #1A1714; }
  .cap-bar {
    position: sticky; top: 0; z-index: 99998; display: flex; align-items: center;
    gap: 12px; padding: 11px 16px; background: #1A1714; color: #FAF6EC;
    box-shadow: 0 2px 12px rgba(0,0,0,.25); flex-wrap: wrap;
  }
  .cap-bar b { font-size: 14px; letter-spacing: .01em; }
  .cap-bar .muted { color: #C9BEA8; font-size: 12px; }
  .cap-bar .grow { flex: 1 1 40px; }
  .cap-bar button.cap-done {
    background: #B08D57; color: #1A1714; border: none; border-radius: 8px;
    padding: 8px 15px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .idx-embed { padding: 10px 14px 48px; }
  .cap-toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 100000;
    padding: 11px 18px; border-radius: 10px; font-size: 13px; color: #FAF6EC;
    box-shadow: 0 6px 24px rgba(0,0,0,.3);
  }
  .cap-addbtn {
    position: absolute; top: 8px; left: 8px; z-index: 9999; background: #1A1714;
    color: #FAF6EC; border: none; border-radius: 8px; padding: 8px 12px;
    font-family: monospace; font-size: 11px; letter-spacing: .05em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 2px 10px rgba(0,0,0,.35);
  }
  .cap-addbtn:disabled { opacity: .85; cursor: default; }
</style>
<script src="https://kestrel.idxhome.com/ihf-kestrel.js"></script>
<script>
  window.ihfKestrel = window.ihfKestrel || {};
  ihfKestrel.config = {
    platform: "custom",
    activationToken: "d77ab7ae-7afe-403d-89cf-61bd60bbf806",
  };
</script>
</head>
<body data-screen-label="Add listings">

<div class="cap-bar">
  <b>Add to collection</b>
  <span class="muted" id="capTarget"></span>
  <span class="grow"></span>
  <span class="muted">Click “＋ Add to collection” on any listing</span>
  <button class="cap-done" type="button" id="capDone">Done — close</button>
</div>

<div class="idx-embed">
  <script>
    document.currentScript.replaceWith(ihfKestrel.render());
  </script>
</div>

<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var COLL  = qs.get('collection') || '';
  var TITLE = qs.get('title') || 'this collection';

  var tgt = document.getElementById('capTarget');
  if (tgt) tgt.textContent = '“' + TITLE + '”';
  var done = document.getElementById('capDone');
  if (done) done.addEventListener('click', function () { window.close(); });

  function toast(msg, good) {
    var t = document.createElement('div');
    t.className = 'cap-toast'; t.textContent = msg;
    t.style.background = good ? '#2E5C3D' : '#8A3B2B';
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2600);
  }

  // iHomefinder's card markup varies, so find cards by content signature
  // (an element that contains an <img>, a "$price", and an "MLS#") rather than
  // a fixed class — keep the smallest matching element.
  function findCards() {
    var out = [], all = document.querySelectorAll('.idx-embed *');
    for (var i = 0; i < all.length && out.length < 200; i++) {
      var n = all[i], txt = n.textContent || '';
      if (!/MLS#?\s*[A-Za-z0-9]/i.test(txt) || !/\$[\d,]{3,}/.test(txt)) continue;
      if (!n.querySelector || !n.querySelector('img')) continue;
      var child = false;
      for (var k = 0; k < n.children.length; k++) {
        var c = n.children[k], ct = c.textContent || '';
        if (/MLS#?\s*[A-Za-z0-9]/i.test(ct) && /\$[\d,]{3,}/.test(ct) && c.querySelector && c.querySelector('img')) { child = true; break; }
      }
      if (!child) out.push(n);
    }
    return out;
  }

  function scrape(card) {
    var text = card.textContent || '';
    var lines = text.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
    var m = function (re) { var x = text.match(re); return x ? x[1] : null; };
    var cityLine = lines.filter(function (l) { return /,\s*[A-Z]{2}\s+\d{5}/.test(l); })[0] || null;
    var street = null, city = null, zip = null;
    if (cityLine) {
      var ix = lines.indexOf(cityLine); if (ix > 0) street = lines[ix - 1];
      var cm = cityLine.match(/^(.*?),\s*([A-Z]{2})\s+(\d{5})/); if (cm) { city = cm[1].trim(); zip = cm[3]; }
    }
    if (!street) street = lines.filter(function (l) { return /^\d+\s+\S+/.test(l) && !/\$/.test(l) && !/MLS/i.test(l); })[0] || null;
    var img = card.querySelector('img');
    var photo = img ? (img.getAttribute('src') || img.getAttribute('data-src') || img.currentSrc || null) : null;
    if (photo && photo.indexOf('http') !== 0) { try { photo = new URL(photo, location.href).href; } catch (e) {} }
    return {
      mls_number: m(/MLS#?\s*([A-Za-z0-9-]+)/i),
      address: street, city: city, zip: zip,
      price: (text.match(/\$[\d,]{3,}/) || [])[0] || null,
      beds: m(/(\d+)\s*(?:bd|beds?)\b/i),
      baths: m(/(\d+(?:\.\d+)?)\s*(?:ba|baths?)\b/i),
      sqft: m(/Sq\s*ft:?\s*([\d,]+)/i),
      photo: photo
    };
  }

  function onAdd(card, btn) {
    if (!COLL) { toast('No collection selected — reopen this from the CRM.', false); return; }
    var listing = scrape(card);
    if (!listing.mls_number && !listing.address) { toast('Couldn’t read that card — open its Details page and add from there.', false); return; }
    var orig = btn.textContent; btn.textContent = 'Adding…'; btn.disabled = true;
    fetch('/api/curate/collections', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ op: 'capture-listing', collection_id: COLL, listing: listing })
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, j: j }; }).catch(function () { return { ok: r.ok, status: r.status, j: {} }; }); })
      .then(function (r) {
        if (r.ok && r.j && r.j.listing) {
          btn.textContent = '✓ Added'; btn.style.background = '#2E5C3D';
          toast('Added ' + (listing.address || listing.mls_number || 'listing') + ' to “' + TITLE + '”.', true);
        } else if (r.status === 401) {
          btn.textContent = orig; btn.disabled = false;
          toast('Please sign in to the CRM in this browser first, then try again.', false);
        } else {
          btn.textContent = orig; btn.disabled = false;
          toast((r.j && r.j.error) || 'Could not add that listing.', false);
        }
      })
      .catch(function () { btn.textContent = orig; btn.disabled = false; toast('Network error — try again.', false); });
  }

  function decorate() {
    findCards().forEach(function (card) {
      if (card.getAttribute('data-cap-dec')) return;
      card.setAttribute('data-cap-dec', '1');
      try { if (getComputedStyle(card).position === 'static') card.style.position = 'relative'; } catch (e) {}
      var btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'cap-addbtn'; btn.textContent = '＋ Add to collection';
      btn.addEventListener('click', function (e) { e.preventDefault(); e.stopPropagation(); onAdd(card, btn); });
      card.appendChild(btn);
    });
  }

  var t;
  var obs = new MutationObserver(function () { clearTimeout(t); t = setTimeout(decorate, 500); });
  obs.observe(document.body, { childList: true, subtree: true });
  setTimeout(decorate, 1200);
})();
</script>
</body>
</html>
